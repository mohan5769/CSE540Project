<svg width="900" height="680" viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="680" fill="white"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Flow 1 — DID Registration</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="300" y="70" width="300" height="55" rx="28" fill="#e8e6f0" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Start: User opens React app</text>
  <text x="450" y="115" text-anchor="middle" font-size="12" fill="#534ab7">Browser loads the dApp</text>
  <line x1="450" y1="125" x2="450" y2="153" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="250" y="155" width="400" height="60" rx="10" fill="#ede9f8" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Connect Wallet</text>
  <text x="450" y="202" text-anchor="middle" font-size="12" fill="#534ab7">MetaMask popup appears and user approves</text>
  <line x1="450" y1="215" x2="450" y2="243" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="250" y="245" width="400" height="60" rx="10" fill="#ede9f8" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Click Register DID</text>
  <text x="450" y="292" text-anchor="middle" font-size="12" fill="#534ab7">App calls DIDRegistry.registerDID()</text>
  <line x1="450" y1="305" x2="450" y2="333" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision -->
  <polygon points="450,335 610,405 450,475 290,405" fill="#fdf3dc" stroke="#c8960c" stroke-width="2"/>
  <text x="450" y="398" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">Already</text>
  <text x="450" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">registered?</text>

  <!-- Yes branch -->
  <line x1="610" y1="405" x2="688" y2="405" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="645" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Yes</text>
  <rect x="690" y="378" width="155" height="55" rx="28" fill="#fce8e8" stroke="#c0392b" stroke-width="2"/>
  <text x="768" y="400" text-anchor="middle" font-size="13" font-weight="bold" fill="#922b21">Revert</text>
  <text x="768" y="420" text-anchor="middle" font-size="11" fill="#922b21">Duplicate address</text>

  <!-- No branch -->
  <line x1="450" y1="475" x2="450" y2="503" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="465" y="493" font-size="12" font-weight="bold" fill="#555">No</text>

  <!-- Step 5 -->
  <rect x="250" y="505" width="400" height="60" rx="10" fill="#d9f2ea" stroke="#0f6e56" stroke-width="2"/>
  <text x="450" y="530" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Generate DID string</text>
  <text x="450" y="552" text-anchor="middle" font-size="12" fill="#0f6e56">did:ethr:0x walletAddress</text>
  <line x1="450" y1="565" x2="450" y2="593" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 6 -->
  <rect x="200" y="595" width="500" height="60" rx="10" fill="#d9f2ea" stroke="#0f6e56" stroke-width="2"/>
  <text x="450" y="620" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Store DID on chain and assign Holder role</text>
  <text x="450" y="642" text-anchor="middle" font-size="12" fill="#0f6e56">Emits DIDRegistered event with no PII</text>
</svg>
