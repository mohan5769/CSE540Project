<svg width="900" height="900" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="900" fill="white"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Flow 2 — Session Creation and Credential Issuance</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="250" y="70" width="400" height="60" rx="10" fill="#ede9f8" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Issuer connects MetaMask</text>
  <text x="450" y="117" text-anchor="middle" font-size="12" fill="#534ab7">Contract verifies Issuer role on load</text>
  <line x1="450" y1="130" x2="450" y2="158" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="225" y="160" width="450" height="60" rx="10" fill="#ede9f8" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Click Create Session</text>
  <text x="450" y="207" text-anchor="middle" font-size="12" fill="#534ab7">Fill title, description, date and event type</text>
  <line x1="450" y1="220" x2="450" y2="248" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="200" y="250" width="500" height="60" rx="10" fill="#d9f2ea" stroke="#0f6e56" stroke-width="2"/>
  <text x="450" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Call createSession() on chain</text>
  <text x="450" y="297" text-anchor="middle" font-size="12" fill="#0f6e56">Session stored on chain and emits SessionCreated event</text>
  <line x1="450" y1="310" x2="450" y2="338" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="250" y="340" width="400" height="60" rx="10" fill="#ede9f8" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Select holder wallet address</text>
  <text x="450" y="387" text-anchor="middle" font-size="12" fill="#534ab7">Enter address in input field</text>
  <line x1="450" y1="400" x2="450" y2="428" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Off-chain box -->
  <rect x="140" y="430" width="620" height="185" rx="12" fill="#fffdf0" stroke="#c8960c" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5c00">Off chain operations</text>

  <!-- Step 5 -->
  <rect x="190" y="460" width="520" height="55" rx="10" fill="#fdf3dc" stroke="#c8960c" stroke-width="2"/>
  <text x="450" y="482" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5c00">Build credential JSON off chain</text>
  <text x="450" y="502" text-anchor="middle" font-size="12" fill="#856404">Using Mohan's credential schema</text>
  <line x1="450" y1="515" x2="450" y2="538" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 6 -->
  <rect x="190" y="540" width="520" height="55" rx="10" fill="#fdf3dc" stroke="#c8960c" stroke-width="2"/>
  <text x="450" y="562" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5c00">Pin JSON to IPFS and hash with keccak256</text>
  <text x="450" y="582" text-anchor="middle" font-size="12" fill="#856404">Receives IPFS URI and credential hash</text>

  <line x1="450" y1="615" x2="450" y2="643" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 7 -->
  <rect x="175" y="645" width="550" height="60" rx="10" fill="#d9f2ea" stroke="#0f6e56" stroke-width="2"/>
  <text x="450" y="670" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Call issueCredential()</text>
  <text x="450" y="692" text-anchor="middle" font-size="12" fill="#0f6e56">holderAddress, sessionId, credentialHash, ipfsURI</text>
  <line x1="450" y1="705" x2="450" y2="733" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 8 -->
  <rect x="150" y="735" width="600" height="60" rx="10" fill="#d9f2ea" stroke="#0f6e56" stroke-width="2"/>
  <text x="450" y="760" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Hash and Active status and IPFS URI stored on chain</text>
  <text x="450" y="782" text-anchor="middle" font-size="12" fill="#0f6e56">Emits CredentialIssued event with no PII</text>
  <line x1="450" y1="795" x2="450" y2="823" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- End -->
  <rect x="270" y="825" width="360" height="52" rx="28" fill="#e8e6f0" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="848" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Credential issued successfully</text>
  <text x="450" y="868" text-anchor="middle" font-size="12" fill="#534ab7">Frontend confirms to issuer</text>
</svg>
