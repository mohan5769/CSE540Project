<svg width="900" height="650" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="650" fill="white"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Flow 4 — Credential Revocation</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="275" y="70" width="350" height="55" rx="10" fill="#ede9f8" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Issuer connects MetaMask</text>
  <text x="450" y="115" text-anchor="middle" font-size="12" fill="#534ab7">Contract verifies Issuer role</text>
  <line x1="450" y1="125" x2="450" y2="153" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="225" y="155" width="450" height="60" rx="10" fill="#ede9f8" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Navigate to issued credentials list</text>
  <text x="450" y="202" text-anchor="middle" font-size="12" fill="#534ab7">Select a credential and click Revoke</text>
  <line x1="450" y1="215" x2="450" y2="243" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision -->
  <polygon points="450,245 625,325 450,405 275,325" fill="#fdf3dc" stroke="#c8960c" stroke-width="2"/>
  <text x="450" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">Caller is</text>
  <text x="450" y="338" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">original issuer?</text>

  <!-- No branch -->
  <line x1="625" y1="325" x2="700" y2="325" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="659" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">No</text>
  <rect x="702" y="298" width="160" height="55" rx="28" fill="#fce8e8" stroke="#c0392b" stroke-width="2"/>
  <text x="782" y="321" text-anchor="middle" font-size="13" font-weight="bold" fill="#922b21">Revert</text>
  <text x="782" y="341" text-anchor="middle" font-size="11" fill="#922b21">Unauthorized caller</text>

  <!-- Yes branch -->
  <line x1="450" y1="405" x2="450" y2="433" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="465" y="423" font-size="12" font-weight="bold" fill="#555">Yes</text>

  <!-- Step: Update -->
  <rect x="200" y="435" width="500" height="60" rx="10" fill="#d9f2ea" stroke="#0f6e56" stroke-width="2"/>
  <text x="450" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Update status on chain: Active to Revoked</text>
  <text x="450" y="482" text-anchor="middle" font-size="12" fill="#0f6e56">IPFS data unchanged — immutable by design</text>
  <line x1="450" y1="495" x2="450" y2="523" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step: Emit -->
  <rect x="200" y="525" width="500" height="60" rx="10" fill="#d9f2ea" stroke="#0f6e56" stroke-width="2"/>
  <text x="450" y="550" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Emits CredentialRevoked event</text>
  <text x="450" y="572" text-anchor="middle" font-size="12" fill="#0f6e56">credentialId, issuerAddress, timestamp with no PII</text>
  <line x1="450" y1="585" x2="450" y2="608" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- End -->
  <rect x="270" y="610" width="360" height="30" rx="15" fill="#e8e6f0" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="630" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Credential successfully revoked</text>
</svg>
