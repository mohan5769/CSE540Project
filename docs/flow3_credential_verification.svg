<svg width="900" height="820" viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="820" fill="white"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Flow 3 — Credential Verification</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="250" y="70" width="400" height="60" rx="10" fill="#ede9f8" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Verifier connects MetaMask</text>
  <text x="450" y="117" text-anchor="middle" font-size="12" fill="#534ab7">No role check needed — public read operation</text>
  <line x1="450" y1="130" x2="450" y2="158" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="200" y="160" width="500" height="60" rx="10" fill="#ede9f8" stroke="#7f77dd" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#3c3489">Enter credential ID</text>
  <text x="450" y="207" text-anchor="middle" font-size="12" fill="#534ab7">App fetches on chain: hash, status and IPFS URI</text>
  <line x1="450" y1="220" x2="450" y2="248" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision 1 -->
  <polygon points="450,250 615,325 450,400 285,325" fill="#fdf3dc" stroke="#c8960c" stroke-width="2"/>
  <text x="450" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">Status =</text>
  <text x="450" y="338" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">Revoked?</text>

  <!-- Yes branch -->
  <line x1="615" y1="325" x2="693" y2="325" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="650" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Yes</text>
  <rect x="695" y="298" width="170" height="55" rx="28" fill="#fce8e8" stroke="#c0392b" stroke-width="2"/>
  <text x="780" y="321" text-anchor="middle" font-size="13" font-weight="bold" fill="#922b21">Invalid</text>
  <text x="780" y="341" text-anchor="middle" font-size="11" fill="#922b21">Credential revoked</text>

  <!-- No branch -->
  <line x1="450" y1="400" x2="450" y2="428" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="465" y="418" font-size="12" font-weight="bold" fill="#555">No</text>

  <!-- Step: Fetch IPFS -->
  <rect x="200" y="430" width="500" height="60" rx="10" fill="#fdf3dc" stroke="#c8960c" stroke-width="2"/>
  <text x="450" y="455" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5c00">Fetch full credential JSON from IPFS</text>
  <text x="450" y="477" text-anchor="middle" font-size="12" fill="#856404">Using the on chain IPFS URI</text>
  <line x1="450" y1="490" x2="450" y2="518" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step: Hash -->
  <rect x="200" y="520" width="500" height="60" rx="10" fill="#fdf3dc" stroke="#c8960c" stroke-width="2"/>
  <text x="450" y="545" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5c00">Hash fetched JSON locally with keccak256</text>
  <text x="450" y="567" text-anchor="middle" font-size="12" fill="#856404">Produces local hash for comparison</text>
  <line x1="450" y1="580" x2="450" y2="608" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision 2 -->
  <polygon points="450,610 615,685 450,760 285,685" fill="#fdf3dc" stroke="#c8960c" stroke-width="2"/>
  <text x="450" y="678" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">Hashes</text>
  <text x="450" y="698" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">match?</text>

  <!-- No branch -->
  <line x1="615" y1="685" x2="693" y2="685" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="650" y="675" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">No</text>
  <rect x="695" y="658" width="170" height="55" rx="28" fill="#fce8e8" stroke="#c0392b" stroke-width="2"/>
  <text x="780" y="681" text-anchor="middle" font-size="13" font-weight="bold" fill="#922b21">Invalid</text>
  <text x="780" y="701" text-anchor="middle" font-size="11" fill="#922b21">Data tampered</text>

  <!-- Yes branch -->
  <line x1="450" y1="760" x2="450" y2="788" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="465" y="778" font-size="12" font-weight="bold" fill="#555">Yes</text>

  <!-- End -->
  <rect x="255" y="790" width="390" height="22" rx="11" fill="#d9f2ea" stroke="#0f6e56" stroke-width="2"/>
  <text x="450" y="806" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Valid — Credential is authentic</text>
</svg>
